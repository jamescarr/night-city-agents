apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: webhook-eventsource
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: night-city-agents
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    merge-request:
      port: "12000"
      endpoint: /merge-request
      method: POST
