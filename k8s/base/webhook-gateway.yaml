apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-gateway
  namespace: night-city
  labels:
    app: webhook-gateway
    app.kubernetes.io/part-of: night-city-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-gateway
  template:
    metadata:
      labels:
        app: webhook-gateway
    spec:
      containers:
        - name: webhook-gateway
          image: night-city-agents:latest
          imagePullPolicy: Never
          command: ["node"]
          args: ["dist/webhook-gateway/server.js"]
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: ARGO_EVENTS_URL
              value: "http://webhook-eventsource-svc.argo-events.svc.cluster.local:12000/merge-request"
            - name: ARGO_SERVER_URL
              value: "http://argo-server.argo.svc.cluster.local:2746"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-gateway
  namespace: night-city
  labels:
    app: webhook-gateway
    app.kubernetes.io/part-of: night-city-agents
spec:
  type: NodePort
  selector:
    app: webhook-gateway
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
