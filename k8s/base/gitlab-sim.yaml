apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-sim
  namespace: night-city
  labels:
    app: gitlab-sim
    app.kubernetes.io/part-of: night-city-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-sim
  template:
    metadata:
      labels:
        app: gitlab-sim
    spec:
      containers:
        - name: gitlab-sim
          image: night-city-agents:latest
          imagePullPolicy: Never
          command: ["node"]
          args: ["dist/gitlab-sim/server.js"]
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-sim
  namespace: night-city
  labels:
    app: gitlab-sim
    app.kubernetes.io/part-of: night-city-agents
spec:
  selector:
    app: gitlab-sim
  ports:
    - port: 3001
      targetPort: 3001
